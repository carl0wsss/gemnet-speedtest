<!DOCTYPE html>
<html>
<head>
    <title>GemNet Speed Test</title>
</head>
<body>
    <button onclick="lancer()">Lancer le test</button>
    <button onclick="arreter()">Arrêter</button>
    <pre id="resultats">Prêt</pre>

    <script src="/speedtest.js"></script>

    <script>
    const s = new Speedtest();

    s.onupdate = (data) => {
        document.getElementById("resultats").textContent =
            "Download : " + data.dlStatus + " Mbps\n" +
            "Upload   : " + data.ulStatus + " Mbps\n" +
            "Ping     : " + data.pingStatus + " ms\n" +
            "Jitter   : " + data.jitterStatus + " ms";
    };

    s.onend = (aborted) => {
        document.getElementById("resultats").textContent +=
            "\n\n===== TEST TERMINÉ =====";
    };

    function lancer() {
        document.getElementById("resultats").textContent = "Test en cours...";
        s.start();
    }

    function arreter() {
        s.abort();
    }
    </script>
</body>
</html>
