<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GemNet Speed Test</title>
<style>
  :root{
    --bleu-nuit:#0B1F4D;
    --bleu-gemnet:#2230E0;
    --rouge-gemnet:#D2151A;
    --fond-carte:#F4F6FB;
    --gris:#6B7390;
    --ligne:#E1E5F0;
    --vert-bon:#1A8F4C;
    --ambre-moyen:#C9870C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--fond-carte);
    font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--bleu-nuit);
    display:flex;
    justify-content:center;
    padding:24px;
  }
  .carte-app{
    width:100%;
    max-width:460px;
    background:#FFFFFF;
    border-radius:16px;
    overflow:hidden;
  }

  .hero{
    background:var(--bleu-nuit);
    padding:28px 24px 36px;
    text-align:center;
  }
  .sous-titre{
    color:#FFFFFF;
    font-size:13px;
    letter-spacing:2px;
    margin:4px 0 0;
    opacity:0.75;
  }
  .serveurs{
    display:flex;
    justify-content:center;
    gap:28px;
    margin-top:22px;
  }
  .noeud{text-align:center;}
  .point{
    width:10px;height:10px;
    border-radius:50%;
    background:#3D63E8;
    margin:0 auto 6px;
    transition:all .25s ease;
  }
  .noeud.actif .point{
    background:var(--rouge-gemnet);
    box-shadow:0 0 0 4px rgba(210,21,26,0.25);
  }
  .nom-noeud{font-size:11px;color:#B9C3E8;}
  .noeud.actif .nom-noeud{color:#FFFFFF;font-weight:500;}

  #btn-start{
    margin-top:22px;
    background:var(--rouge-gemnet);
    color:#FFFFFF;
    border:none;
    font-weight:500;
    font-size:14px;
    padding:12px 38px;
    border-radius:100px;
    cursor:pointer;
  }
  #btn-start:disabled{opacity:0.6;cursor:not-allowed;}
  #statut{
    color:#B9C3E8;
    font-size:12px;
    margin-top:10px;
    min-height:16px;
  }

  .contenu{padding:20px;}

  .badge-qualite{
    display:none;
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:14px;
    text-align:center;
  }
  .badge-titre{
    font-size:11px;
    letter-spacing:1px;
    margin:0 0 4px;
    opacity:0.8;
  }
  .badge-valeur{
    font-size:18px;
    font-weight:700;
    margin:0;
  }
  .badge-good{background:#E7F5ED;color:var(--vert-bon);}
  .badge-fair{background:#FBF1DE;color:var(--ambre-moyen);}
  .badge-poor{background:#FBE9E9;color:var(--rouge-gemnet);}

  .detail-grille{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:12px;
  }
  .detail-item{
    background:rgba(255,255,255,0.55);
    border-radius:8px;
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .detail-label{font-size:11px;color:var(--bleu-nuit);opacity:0.75;}
  .detail-tag{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.5px;
    padding:3px 8px;
    border-radius:100px;
    background:#E1E5F0;
    color:var(--gris);
  }
  .tag-good{background:#1A8F4C;color:#FFFFFF;}
  .tag-fair{background:#C9870C;color:#FFFFFF;}
  .tag-poor{background:#D2151A;color:#FFFFFF;}

  .carte-mesure{
    background:var(--fond-carte);
    border-radius:12px;
    padding:14px;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:14px;
  }

  .jauge-wrap{
    position:relative;
    width:88px;height:88px;
    flex-shrink:0;
  }
  .jauge-centre{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .jauge-valeur{font-size:17px;font-weight:700;color:var(--bleu-nuit);}
  .jauge-unite{font-size:9px;color:var(--gris);}

  .col-courbe{flex:1;min-width:0;}
  .label-mesure{
    font-size:11px;
    letter-spacing:1px;
    color:var(--gris);
    margin:0 0 6px;
  }
  .ligne-stats{
    display:flex;
    justify-content:space-between;
    margin-top:4px;
    font-size:10px;
    color:var(--gris);
  }

  .carte-double{justify-content:space-around;}
  .stat{text-align:center;}
  .stat-valeur{font-size:20px;font-weight:700;margin:0;}
  .stat-label{font-size:10px;letter-spacing:1px;color:var(--gris);margin:2px 0 0;}
  .unite-stat{font-size:11px;color:var(--gris);font-weight:400;}
  .separateur-v{width:1px;height:28px;background:var(--ligne);}

  .info-serveur{
    text-align:center;
    font-size:11px;
    color:var(--gris);
    margin:4px 0 0;
  }

  .source-norme{
    text-align:center;
    font-size:10px;
    color:var(--gris);
    margin:14px 0 0;
    line-height:1.5;
  }
</style>
</head>
<body>

<div class="carte-app">

  <div class="hero">
    <svg width="120" height="58" viewBox="0 0 1024 512" aria-label="GemNet">
      <ellipse cx="512" cy="256" rx="380" ry="120" transform="rotate(-25 512 256)" fill="none" stroke="#2230E0" stroke-width="34"/>
      <text x="512" y="290" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="150" fill="#D2151A">GEMNET</text>
    </svg>
    <p class="sous-titre">SPEED TEST</p>

    <div class="serveurs">
      <div class="noeud" id="noeud-eu"><div class="point"></div><div class="nom-noeud">EUROPE</div></div>
      <div class="noeud" id="noeud-asia"><div class="point"></div><div class="nom-noeud">ASIA</div></div>
      <div class="noeud" id="noeud-usa"><div class="point"></div><div class="nom-noeud">USA</div></div>
    </div>

    <button id="btn-start" onclick="lancer()">START TEST</button>
    <div id="statut">Ready</div>
  </div>

  <div class="contenu">

    <div class="badge-qualite" id="badge-qualite">
      <p class="badge-titre">CONNECTION QUALITY</p>
      <p class="badge-valeur" id="badge-valeur">—</p>
      <div class="detail-grille">
        <div class="detail-item"><span class="detail-label">Download</span><span class="detail-tag" id="tag-dl">—</span></div>
        <div class="detail-item"><span class="detail-label">Upload</span><span class="detail-tag" id="tag-ul">—</span></div>
        <div class="detail-item"><span class="detail-label">Latency</span><span class="detail-tag" id="tag-ping">—</span></div>
        <div class="detail-item"><span class="detail-label">Jitter</span><span class="detail-tag" id="tag-jitter">—</span></div>
      </div>
    </div>

    <div class="carte-mesure">
      <div class="jauge-wrap">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="36" fill="none" stroke="#E1E5F0" stroke-width="8"/>
          <circle id="anneau-dl" cx="44" cy="44" r="36" fill="none" stroke="#2230E0" stroke-width="8"
                  stroke-linecap="round" stroke-dasharray="226.19" stroke-dashoffset="226.19"
                  transform="rotate(-90 44 44)" style="transition:stroke-dashoffset .3s ease;"/>
        </svg>
        <div class="jauge-centre">
          <span class="jauge-valeur" id="jauge-val-dl">0</span>
          <span class="jauge-unite">Mbps</span>
        </div>
      </div>
      <div class="col-courbe">
        <p class="label-mesure">DOWNLOAD</p>
        <svg width="100%" height="40" viewBox="0 0 240 40" preserveAspectRatio="none">
          <path id="aire-dl" fill="#2230E0" opacity="0.15" d=""></path>
          <path id="ligne-dl" fill="none" stroke="#2230E0" stroke-width="2.5" d=""></path>
        </svg>
        <div class="ligne-stats">
          <span id="peak-dl">Peak 0</span>
          <span id="avg-dl">Avg 0</span>
        </div>
      </div>
    </div>

    <div class="carte-mesure">
      <div class="jauge-wrap">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="36" fill="none" stroke="#E1E5F0" stroke-width="8"/>
          <circle id="anneau-ul" cx="44" cy="44" r="36" fill="none" stroke="#D2151A" stroke-width="8"
                  stroke-linecap="round" stroke-dasharray="226.19" stroke-dashoffset="226.19"
                  transform="rotate(-90 44 44)" style="transition:stroke-dashoffset .3s ease;"/>
        </svg>
        <div class="jauge-centre">
          <span class="jauge-valeur" id="jauge-val-ul">0</span>
          <span class="jauge-unite">Mbps</span>
        </div>
      </div>
      <div class="col-courbe">
        <p class="label-mesure">UPLOAD</p>
        <svg width="100%" height="40" viewBox="0 0 240 40" preserveAspectRatio="none">
          <path id="aire-ul" fill="#D2151A" opacity="0.15" d=""></path>
          <path id="ligne-ul" fill="none" stroke="#D2151A" stroke-width="2.5" d=""></path>
        </svg>
        <div class="ligne-stats">
          <span id="peak-ul">Peak 0</span>
          <span id="avg-ul">Avg 0</span>
        </div>
      </div>
    </div>

    <div class="carte-mesure carte-double">
      <div class="stat">
        <p class="stat-valeur" id="val-ping">0<span class="unite-stat"> ms</span></p>
        <p class="stat-label">PING</p>
      </div>
      <div class="separateur-v"></div>
      <div class="stat">
        <p class="stat-valeur" id="val-jitter">0<span class="unite-stat"> ms</span></p>
        <p class="stat-label">JITTER</p>
      </div>
    </div>

    <p class="info-serveur" id="info-serveur"></p>
    <p class="source-norme">Quality rating based on ITU-T G.114 (latency) and common real-time jitter and throughput thresholds (ITU-T G.1010).</p>

  </div>
</div>

<script src="/speedtest.js"></script>
<script>
const SERVEURS = [
  { id:"eu",   name:"Frankfurt (Europe)", server:"https://gemnet-speedtest.onrender.com/",         dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" },
  { id:"asia", name:"Singapore (Asia)",    server:"https://gemnet-speedtest-asia.onrender.com/",    dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" },
  { id:"usa",  name:"USA",                 server:"https://gemnet-speedtest-america.onrender.com/", dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" }
];

const CIRCONFERENCE = 226.19;
const MAX_JAUGE = 1000;

let s = null;
let dlHistory = [];
let ulHistory = [];
let dernierPing = 0;
let dernierJitter = 0;

function majJauge(idAnneau, valeur){
  const pct = Math.min(valeur / MAX_JAUGE, 1);
  const offset = CIRCONFERENCE * (1 - pct);
  document.getElementById(idAnneau).setAttribute("stroke-dashoffset", offset.toFixed(1));
}

function construireChemins(history, w, h, padHaut, padBas){
  if(history.length < 2){
    return { ligne:`M0,${h-padBas} L${w},${h-padBas}`, aire:`M0,${h-padBas} L${w},${h-padBas} L${w},${h} L0,${h} Z` };
  }
  const maxV = Math.max(...history, 10) * 1.15;
  const step = w / (history.length - 1);
  const pts = history.map((v,i) => {
    const x = i * step;
    const y = padHaut + (h - padHaut - padBas) * (1 - Math.min(v / maxV, 1));
    return [x.toFixed(1), y.toFixed(1)];
  });
  const ligne = "M" + pts.map(p => p.join(",")).join(" L");
  const aire = ligne + ` L${w},${h} L0,${h} Z`;
  return { ligne, aire };
}

function dessiner(history, idLigne, idAire){
  const { ligne, aire } = construireChemins(history, 240, 40, 3, 3);
  document.getElementById(idLigne).setAttribute("d", ligne);
  document.getElementById(idAire).setAttribute("d", aire);
}

function statsNonNulles(history){
  const valeurs = history.filter(v => v > 0);
  if(valeurs.length === 0) return { peak:0, avg:0 };
  const peak = Math.max(...valeurs);
  const avg = valeurs.reduce((a,b) => a+b, 0) / valeurs.length;
  return { peak: peak.toFixed(0), avg: parseFloat(avg.toFixed(0)) };
}

// --- Quality scoring (ITU-T G.114 for latency, common thresholds for jitter and throughput) ---
function noteDebit(mbps){
  if(mbps >= 25) return 2;
  if(mbps >= 10) return 1;
  return 0;
}
function noteLatence(ms){
  if(ms <= 150) return 2;
  if(ms <= 400) return 1;
  return 0;
}
function noteJitter(ms){
  if(ms <= 30) return 2;
  if(ms <= 50) return 1;
  return 0;
}

function afficherBadgeQualite(avgDl, avgUl, ping, jitter){
  const metriques = {
    dl:     noteDebit(avgDl),
    ul:     noteDebit(avgUl),
    ping:   noteLatence(ping),
    jitter: noteJitter(jitter)
  };

  const LIBELLES = { 2:"GOOD", 1:"FAIR", 0:"POOR" };
  const CLASSES_TAG = { 2:"tag-good", 1:"tag-fair", 0:"tag-poor" };
  const CLASSES_BADGE = { 2:"badge-good", 1:"badge-fair", 0:"badge-poor" };

  ["dl","ul","ping","jitter"].forEach(cle => {
    const tag = document.getElementById("tag-" + cle);
    tag.textContent = LIBELLES[metriques[cle]];
    tag.className = "detail-tag " + CLASSES_TAG[metriques[cle]];
  });

  const somme = metriques.dl + metriques.ul + metriques.ping + metriques.jitter;
  const moyenne = somme / 4;
  let noteGlobale;
  if (moyenne >= 1.5) noteGlobale = 2;
  else if (moyenne >= 0.75) noteGlobale = 1;
  else noteGlobale = 0;

  const badge = document.getElementById("badge-qualite");
  badge.style.display = "block";
  badge.className = "badge-qualite " + CLASSES_BADGE[noteGlobale];
  document.getElementById("badge-valeur").textContent = LIBELLES[noteGlobale];
}

function reinitialiserAffichage(){
  dlHistory = [];
  ulHistory = [];
  dessiner(dlHistory, "ligne-dl", "aire-dl");
  dessiner(ulHistory, "ligne-ul", "aire-ul");
  document.getElementById("jauge-val-dl").textContent = "0";
  document.getElementById("jauge-val-ul").textContent = "0";
  majJauge("anneau-dl", 0);
  majJauge("anneau-ul", 0);
  document.getElementById("peak-dl").textContent = "Peak 0";
  document.getElementById("avg-dl").textContent = "Avg 0";
  document.getElementById("peak-ul").textContent = "Peak 0";
  document.getElementById("avg-ul").textContent = "Avg 0";
  document.getElementById("val-ping").innerHTML = '0<span class="unite-stat"> ms</span>';
  document.getElementById("val-jitter").innerHTML = '0<span class="unite-stat"> ms</span>';
  document.querySelectorAll(".noeud").forEach(n => n.classList.remove("actif"));
  document.getElementById("info-serveur").textContent = "";
  document.getElementById("badge-qualite").style.display = "none";
  ["dl","ul","ping","jitter"].forEach(cle => {
    const tag = document.getElementById("tag-" + cle);
    tag.textContent = "—";
    tag.className = "detail-tag";
  });
  dernierPing = 0;
  dernierJitter = 0;
}

function lancer(){
  document.getElementById("btn-start").disabled = true;
  document.getElementById("statut").textContent = "Selecting the closest server…";
  reinitialiserAffichage();

  s = new Speedtest();
  s.addTestPoints(SERVEURS);

  s.onupdate = (data) => {
    const dl = parseFloat(data.dlStatus) || 0;
    const ul = parseFloat(data.ulStatus) || 0;
    const ping = parseFloat(data.pingStatus) || 0;
    const jitter = parseFloat(data.jitterStatus) || 0;

    if(ping > 0) dernierPing = ping;
    if(jitter > 0) dernierJitter = jitter;

    if(data.testState === 1){
      dlHistory.push(dl);
      document.getElementById("jauge-val-dl").textContent = dl.toFixed(0);
      majJauge("anneau-dl", dl);
      dessiner(dlHistory, "ligne-dl", "aire-dl");
      const st = statsNonNulles(dlHistory);
      document.getElementById("peak-dl").textContent = "Peak " + st.peak;
      document.getElementById("avg-dl").textContent = "Avg " + st.avg;
    }

    if(data.testState === 3){
      ulHistory.push(ul);
      document.getElementById("jauge-val-ul").textContent = ul.toFixed(0);
      majJauge("anneau-ul", ul);
      dessiner(ulHistory, "ligne-ul", "aire-ul");
      const st = statsNonNulles(ulHistory);
      document.getElementById("peak-ul").textContent = "Peak " + st.peak;
      document.getElementById("avg-ul").textContent = "Avg " + st.avg;
    }

    document.getElementById("val-ping").innerHTML = ping.toFixed(0) + '<span class="unite-stat"> ms</span>';
    document.getElementById("val-jitter").innerHTML = jitter.toFixed(1) + '<span class="unite-stat"> ms</span>';

    const LABELS = { 0:"Initializing…", 1:"Measuring download…", 2:"Measuring ping…", 3:"Measuring upload…", 4:"Done", 5:"Stopped" };
    document.getElementById("statut").textContent = LABELS[data.testState] ?? "";
  };

  s.onend = (aborted) => {
    document.getElementById("statut").textContent = aborted ? "Test stopped" : "Test completed";
    document.getElementById("btn-start").disabled = false;
    document.getElementById("btn-start").textContent = "RESTART TEST";

    if(!aborted){
      const stDl = statsNonNulles(dlHistory);
      const stUl = statsNonNulles(ulHistory);
      afficherBadgeQualite(stDl.avg, stUl.avg, dernierPing, dernierJitter);
    }
  };

  s.selectServer((best) => {
    if(!best){
      document.getElementById("statut").textContent = "No server available";
      document.getElementById("btn-start").disabled = false;
      return;
    }
    document.getElementById("noeud-" + best.id).classList.add("actif");
    document.getElementById("info-serveur").textContent =
      "Selected server: " + best.name + " — " + best.pingT.toFixed(0) + " ms";
    document.getElementById("btn-start").textContent = "TEST RUNNING…";
    s.start();
  });
}
</script>
</body>
</html>
