<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GemNet Speed Test</title>
<style>
  :root{
    --bleu-nuit:#0B1F4D;
    --bleu-gemnet:#2230E0;
    --rouge-gemnet:#D2151A;
    --fond-carte:#F4F6FB;
    --gris:#6B7390;
    --ligne:#E1E5F0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--fond-carte);
    font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--bleu-nuit);
    display:flex;
    justify-content:center;
    padding:24px;
  }
  .carte-app{
    width:100%;
    max-width:460px;
    background:#FFFFFF;
    border-radius:16px;
    overflow:hidden;
  }

  /* HEADER */
  .hero{
    background:var(--bleu-nuit);
    padding:28px 24px 36px;
    text-align:center;
  }
  .logo-wrap{margin-bottom:4px;}
  .sous-titre{
    color:#FFFFFF;
    font-size:13px;
    letter-spacing:2px;
    margin:4px 0 0;
    opacity:0.75;
  }

  .serveurs{
    display:flex;
    justify-content:center;
    gap:28px;
    margin-top:22px;
  }
  .noeud{text-align:center;}
  .point{
    width:10px;height:10px;
    border-radius:50%;
    background:#3D63E8;
    margin:0 auto 6px;
    transition:all .25s ease;
  }
  .noeud.actif .point{
    background:var(--rouge-gemnet);
    box-shadow:0 0 0 4px rgba(210,21,26,0.25);
  }
  .nom-noeud{font-size:11px;color:#B9C3E8;}
  .noeud.actif .nom-noeud{color:#FFFFFF;font-weight:500;}

  #btn-start{
    margin-top:22px;
    background:var(--rouge-gemnet);
    color:#FFFFFF;
    border:none;
    font-weight:500;
    font-size:14px;
    padding:12px 38px;
    border-radius:100px;
    cursor:pointer;
  }
  #btn-start:disabled{opacity:0.6;cursor:not-allowed;}
  #statut{
    color:#B9C3E8;
    font-size:12px;
    margin-top:10px;
    min-height:16px;
  }

  /* CONTENU */
  .contenu{padding:24px;}
  .carte-mesure{
    background:var(--fond-carte);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
  }
  .ligne-titre{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:8px;
  }
  .label-mesure{
    font-size:11px;
    letter-spacing:1px;
    color:var(--gris);
    margin:0;
  }
  .valeur-mesure{
    font-size:22px;
    font-weight:700;
    margin:0;
  }
  .unite{font-size:11px;color:var(--gris);font-weight:400;}
  .ligne-stats{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    font-size:11px;
    color:var(--gris);
  }

  .carte-double{
    display:flex;
    justify-content:space-around;
    align-items:center;
  }
  .stat{text-align:center;}
  .stat-valeur{font-size:20px;font-weight:700;margin:0;}
  .stat-label{font-size:10px;letter-spacing:1px;color:var(--gris);margin:2px 0 0;}
  .separateur-v{width:1px;height:28px;background:var(--ligne);}

  .info-serveur{
    text-align:center;
    font-size:11px;
    color:var(--gris);
    margin:12px 0 0;
  }
</style>
</head>
<body>

<div class="carte-app">

  <div class="hero">
    <div class="logo-wrap">
      <svg width="120" height="58" viewBox="0 0 1024 512" aria-label="GemNet">
        <ellipse cx="512" cy="256" rx="380" ry="120" transform="rotate(-25 512 256)" fill="none" stroke="#2230E0" stroke-width="34"/>
        <text x="512" y="290" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="150" fill="#D2151A">GEMNET</text>
      </svg>
    </div>
    <p class="sous-titre">SPEED TEST</p>

    <div class="serveurs">
      <div class="noeud" id="noeud-eu"><div class="point"></div><div class="nom-noeud">EUROPE</div></div>
      <div class="noeud" id="noeud-asia"><div class="point"></div><div class="nom-noeud">ASIE</div></div>
      <div class="noeud" id="noeud-usa"><div class="point"></div><div class="nom-noeud">USA</div></div>
    </div>

    <button id="btn-start" onclick="lancer()">LANCER LE TEST</button>
    <div id="statut">Prêt</div>
  </div>

  <div class="contenu">

    <div class="carte-mesure">
      <div class="ligne-titre">
        <p class="label-mesure">DOWNLOAD</p>
        <p class="valeur-mesure" id="val-dl">0<span class="unite"> Mbps</span></p>
      </div>
      <svg width="100%" height="48" viewBox="0 0 400 48" preserveAspectRatio="none">
        <path id="aire-dl" fill="#2230E0" opacity="0.15" d=""></path>
        <path id="ligne-dl" fill="none" stroke="#2230E0" stroke-width="2.5" d=""></path>
      </svg>
      <div class="ligne-stats">
        <span id="peak-dl">Peak 0</span>
        <span id="avg-dl">Avg 0</span>
      </div>
    </div>

    <div class="carte-mesure">
      <div class="ligne-titre">
        <p class="label-mesure">UPLOAD</p>
        <p class="valeur-mesure" id="val-ul">0<span class="unite"> Mbps</span></p>
      </div>
      <svg width="100%" height="48" viewBox="0 0 400 48" preserveAspectRatio="none">
        <path id="aire-ul" fill="#D2151A" opacity="0.15" d=""></path>
        <path id="ligne-ul" fill="none" stroke="#D2151A" stroke-width="2.5" d=""></path>
      </svg>
      <div class="ligne-stats">
        <span id="peak-ul">Peak 0</span>
        <span id="avg-ul">Avg 0</span>
      </div>
    </div>

    <div class="carte-mesure carte-double">
      <div class="stat">
        <p class="stat-valeur" id="val-ping">0<span class="unite"> ms</span></p>
        <p class="stat-label">PING</p>
      </div>
      <div class="separateur-v"></div>
      <div class="stat">
        <p class="stat-valeur" id="val-jitter">0<span class="unite"> ms</span></p>
        <p class="stat-label">JITTER</p>
      </div>
    </div>

    <p class="info-serveur" id="info-serveur"></p>

  </div>
</div>

<script src="/speedtest.js"></script>
<script>
const s = new Speedtest();
const SERVEURS = [
  { id:"eu",   name:"Frankfurt (Europe)", server:"https://gemnet-speedtest.onrender.com/",         dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" },
  { id:"asia", name:"Singapore (Asie)",    server:"https://gemnet-speedtest-asia.onrender.com/",    dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" },
  { id:"usa",  name:"USA",                 server:"https://gemnet-speedtest-america.onrender.com/", dlURL:"backend/garbage.php", ulURL:"backend/empty.php", pingURL:"backend/empty.php", getIpURL:"backend/getIP.php" }
];
s.addTestPoints(SERVEURS);

let dlHistory = [];
let ulHistory = [];

function construireChemins(history, w, h, padHaut, padBas){
  if(history.length < 2){
    return { ligne:`M0,${h-padBas} L${w},${h-padBas}`, aire:`M0,${h-padBas} L${w},${h-padBas} L${w},${h} L0,${h} Z` };
  }
  const maxV = Math.max(...history, 10) * 1.15;
  const step = w / (history.length - 1);
  const pts = history.map((v,i) => {
    const x = i * step;
    const y = padHaut + (h - padHaut - padBas) * (1 - Math.min(v / maxV, 1));
    return [x.toFixed(1), y.toFixed(1)];
  });
  const ligne = "M" + pts.map(p => p.join(",")).join(" L");
  const aire = ligne + ` L${w},${h} L0,${h} Z`;
  return { ligne, aire };
}

function dessiner(history, idLigne, idAire){
  const { ligne, aire } = construireChemins(history, 400, 48, 4, 4);
  document.getElementById(idLigne).setAttribute("d", ligne);
  document.getElementById(idAire).setAttribute("d", aire);
}

function statsNonNulles(history){
  const valeurs = history.filter(v => v > 0);
  if(valeurs.length === 0) return { peak:0, avg:0 };
  const peak = Math.max(...valeurs);
  const avg = valeurs.reduce((a,b) => a+b, 0) / valeurs.length;
  return { peak: peak.toFixed(0), avg: avg.toFixed(0) };
}

s.onupdate = (data) => {
  const dl = parseFloat(data.dlStatus) || 0;
  const ul = parseFloat(data.ulStatus) || 0;
  const ping = parseFloat(data.pingStatus) || 0;
  const jitter = parseFloat(data.jitterStatus) || 0;

  if(data.testState === 1){
    dlHistory.push(dl);
    document.getElementById("val-dl").innerHTML = dl.toFixed(0) + '<span class="unite"> Mbps</span>';
    dessiner(dlHistory, "ligne-dl", "aire-dl");
    const st = statsNonNulles(dlHistory);
    document.getElementById("peak-dl").textContent = "Peak " + st.peak;
    document.getElementById("avg-dl").textContent = "Avg " + st.avg;
  }

  if(data.testState === 3){
    ulHistory.push(ul);
    document.getElementById("val-ul").innerHTML = ul.toFixed(0) + '<span class="unite"> Mbps</span>';
    dessiner(ulHistory, "ligne-ul", "aire-ul");
    const st = statsNonNulles(ulHistory);
    document.getElementById("peak-ul").textContent = "Peak " + st.peak;
    document.getElementById("avg-ul").textContent = "Avg " + st.avg;
  }

  document.getElementById("val-ping").innerHTML = ping.toFixed(0) + '<span class="unite"> ms</span>';
  document.getElementById("val-jitter").innerHTML = jitter.toFixed(1) + '<span class="unite"> ms</span>';

  const LABELS = { 0:"Initialisation…", 1:"Mesure du download…", 2:"Mesure du ping…", 3:"Mesure de l'upload…", 4:"Terminé", 5:"Arrêté" };
  document.getElementById("statut").textContent = LABELS[data.testState] ?? "";
};

s.onend = (aborted) => {
  document.getElementById("statut").textContent = aborted ? "Test arrêté" : "Test terminé";
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-start").textContent = "RELANCER LE TEST";
};

function lancer(){
  document.getElementById("btn-start").disabled = true;
  document.getElementById("statut").textContent = "Sélection du serveur le plus proche…";
  document.querySelectorAll(".noeud").forEach(n => n.classList.remove("actif"));
  document.getElementById("info-serveur").textContent = "";
  dlHistory = [];
  ulHistory = [];
  dessiner(dlHistory, "ligne-dl", "aire-dl");
  dessiner(ulHistory, "ligne-ul", "aire-ul");
  document.getElementById("val-dl").innerHTML = '0<span class="unite"> Mbps</span>';
  document.getElementById("val-ul").innerHTML = '0<span class="unite"> Mbps</span>';
  document.getElementById("peak-dl").textContent = "Peak 0";
  document.getElementById("avg-dl").textContent = "Avg 0";
  document.getElementById("peak-ul").textContent = "Peak 0";
  document.getElementById("avg-ul").textContent = "Avg 0";

  s.selectServer((best) => {
    if(!best){
      document.getElementById("statut").textContent = "Aucun serveur disponible";
      document.getElementById("btn-start").disabled = false;
      return;
    }
    document.getElementById("noeud-" + best.id).classList.add("actif");
    document.getElementById("info-serveur").textContent =
      "Serveur sélectionné : " + best.name + " — " + best.pingT.toFixed(0) + " ms";
    document.getElementById("btn-start").textContent = "TEST EN COURS…";
    s.start();
  });
}
</script>
</body>
</html>
