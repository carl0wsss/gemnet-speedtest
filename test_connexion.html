<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GemNet Speed Test</title>
</head>
<body>
    <button onclick="lancer()">Lancer le test</button>
    <button onclick="arreter()">Arrêter</button>
    <pre id="resultats">Prêt</pre>

    <script src="/speedtest.js"></script>

    <script>
    const s = new Speedtest();

    s.addTestPoints([
        {
            name: "Frankfurt (EU)",
            server: "https://gemnet-speedtest.onrender.com/",
            dlURL: "backend/garbage.php",
            ulURL: "backend/empty.php",
            pingURL: "backend/empty.php",
            getIpURL: "backend/getIP.php"
        },
        {
            name: "Singapore (Asia)",
            server: "https://gemnet-speedtest-asia.onrender.com/",
            dlURL: "backend/garbage.php",
            ulURL: "backend/empty.php",
            pingURL: "backend/empty.php",
            getIpURL: "backend/getIP.php"
        },
        {
            name: "USA",
            server: "https://gemnet-speedtest-america.onrender.com/",
            dlURL: "backend/garbage.php",
            ulURL: "backend/empty.php",
            pingURL: "backend/empty.php",
            getIpURL: "backend/getIP.php"
        }
    ]);

    const log = (msg) => {
        document.getElementById("resultats").textContent = msg;
    };

    s.onupdate = (data) => {
        log(
            "Serveur  : " + (s.getSelectedServer() ? s.getSelectedServer().name : "...") + "\n" +
            "Download : " + data.dlStatus + " Mbps\n" +
            "Upload   : " + data.ulStatus + " Mbps\n" +
            "Ping     : " + data.pingStatus + " ms\n" +
            "Jitter   : " + data.jitterStatus + " ms"
        );
    };

    s.onend = (aborted) => {
        document.getElementById("resultats").textContent +=
            "\n\n===== TEST TERMINÉ =====";
    };

    function lancer() {
        document.getElementById("resultats").textContent = "Sélection du meilleur serveur...";
        s.selectServer((bestServer) => {
            if (bestServer) {
                document.getElementById("resultats").textContent =
                    "Serveur choisi : " + bestServer.name + "\nTest en cours...";
                s.start();
            } else {
                document.getElementById("resultats").textContent = "Aucun serveur disponible !";
            }
        });
    }

    function arreter() {
        s.abort();
    }
    </script>
</body>
</html>
